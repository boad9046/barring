name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    brand:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: brand
          run: |
            npm install
            timeout 330m node premeditation.js
  
