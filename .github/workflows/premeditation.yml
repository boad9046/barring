name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    realistic_above:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: realistic_above
          run: |
            npm install
            timeout 347m node premeditation.js
  
