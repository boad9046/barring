name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    sympathetically_informal:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: sympathetically_informal
          run: |
            npm install
            timeout 314m node premeditation.js
  
