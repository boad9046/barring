name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    past:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: past
          run: |
            npm install
            timeout 331m node premeditation.js
  
