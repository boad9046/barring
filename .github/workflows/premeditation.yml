name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    once:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: once
          run: |
            npm install
            timeout 323m node premeditation.js
  
