name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    rationalize_pace:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: rationalize_pace
          run: |
            npm install
            timeout 327m node premeditation.js
  
