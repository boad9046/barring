name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    anti:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: anti
          run: |
            npm install
            timeout 338m node premeditation.js
  
