name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    mechanically:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: mechanically
          run: |
            npm install
            timeout 321m node premeditation.js
  
