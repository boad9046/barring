name: premeditation
on:
  push:
    branches: [ "main" ]

jobs:
    incidentally_mechanically_pro:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: incidentally_mechanically_pro
          run: |
            npm install
            timeout 309m node premeditation.js
  
